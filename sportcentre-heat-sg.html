<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEAT/SG — ActiveSG Sport Centres Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SPORT SINGAPORE BRAND PALETTE
   Primary red:   #E31837  (SportSG logo red)
   Navy:          #1A2233  (dark base — adapted from SSG navy)
   White:         #FFFFFF
   Light grey:    #F5F5F5
   ============================================================ */
:root{
  /* Base — ash grey light mode */
  --bg:           #B2B6BC;   /* ash grey — page background */
  --bg-panel:     #8A8F97;   /* darker ash — header/panel */
  --bg-card:      #F2F3F4;   /* near-white card surface */
  --bg-card-alt:  #E5E7E9;   /* slightly deeper — data bar */

  /* Text — dark on light */
  --white:        #1A1D22;   /* primary text — dark charcoal */
  --text-dim:     #4A5060;   /* secondary text */
  --text-dimmer:  #7A8090;   /* tertiary text */
  --line:         #C9CDD2;   /* borders */

  /* SportSG brand */
  --ssg-red:      #E31837;
  --ssg-red-dim:  #FDEAED;   /* light red tint for light bg */

  /* Status colours — matched exactly from user palette */
  --safe:         #CAD73E;   /* yellow-green — borders, backgrounds */
  --safe-dim:     #F4F7D0;   /* pale tint for light card bg */
  --safe-text:    #636A00;   /* darkened for readable text on white */
  --caution:      #FFC432;   /* amber/gold — borders, backgrounds */
  --caution-dim:  #FFF3CC;   /* pale tint for light card bg */
  --caution-text: #7A5200;   /* darkened for readable text on white */
  --danger:       #F50016;   /* red — borders, backgrounds */
  --danger-dim:   #FFD0D4;   /* pale tint for light card bg */
  --danger-text:  #A30010;   /* darkened for readable text on white */

  /* Zone header accent */
  --zone-border:  #E31837;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);
  color:var(--white);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ---- HEADER ---- */
.header{
  background:var(--ssg-red);
  border-bottom:3px solid #B01228;
  padding:0 28px;
  color:#fff;
}
.header-inner{
  max-width:1600px;
  margin:0 auto;
  display:flex;
  align-items:stretch;
  justify-content:space-between;
  min-height:64px;
  gap:20px;
}
.brand-block{
  display:flex;
  align-items:center;
  gap:16px;
  padding:12px 0;
}
.brand-bar{
  width:4px;
  height:36px;
  background:rgba(255,255,255,0.5);
  border-radius:2px;
}
.brand-text{}
.brand-main{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:22px;
  letter-spacing:0.08em;
  color:#fff;
  line-height:1;
}
.brand-sub{
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  margin-top:3px;
}
.header-right{
  display:flex;
  align-items:center;
  gap:24px;
}
.clock-block{
  text-align:right;
  border-left:1px solid rgba(255,255,255,0.25);
  padding-left:20px;
}
.clock-date{
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
}
.clock-time{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;
  font-size:17px;
  color:#fff;
  font-variant-numeric:tabular-nums;
  letter-spacing:0.04em;
}

/* ---- DATA BAR ---- */
.data-bar{
  background:var(--bg-card-alt);
  border-bottom:1px solid var(--line);
  padding:0 28px;
}
.data-bar-inner{
  max-width:1600px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:0;
  height:36px;
  overflow-x:auto;
}
.data-pill{
  font-size:13px;
  color:var(--text-dim);
  padding:0 18px;
  height:100%;
  display:flex;
  align-items:center;
  border-right:1px solid var(--line);
  white-space:nowrap;
  letter-spacing:0.02em;
}
.data-pill:first-child{ border-left:1px solid var(--line); }
.data-pill span{ color:var(--white); font-weight:600; margin-left:5px; }
.status-pill{
  margin-left:auto;
  font-size:13px;
  color:var(--text-dim);
  font-style:italic;
  padding-left:16px;
  white-space:nowrap;
}

/* ---- DASHBOARD BODY ---- */
.body{
  max-width:1600px;
  margin:0 auto;
  padding:24px 28px 48px;
}

/* ---- ZONE ---- */
.zone{ margin-bottom:28px; }
.zone-header{
  display:flex;
  align-items:center;
  gap:0;
  margin-bottom:14px;
}
.zone-label-block{
  display:flex;
  align-items:center;
  gap:0;
  background:var(--ssg-red);
  border-radius:3px 0 0 3px;
  overflow:hidden;
}
.zone-icon{
  background:rgba(0,0,0,0.25);
  padding:5px 10px;
  font-size:13px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  font-weight:600;
}
.zone-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:15px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#fff;
  padding:5px 14px 5px 10px;
}
.zone-count{
  font-size:12px;
  color:var(--text-dim);
  margin-left:10px;
  font-weight:600;
  letter-spacing:0.06em;
}
.zone-line{
  flex:1;
  height:1px;
  background:var(--line);
  margin-left:0;
}

/* ---- GRID ---- */
.zone-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:12px;
}

/* ---- CENTRE CARD ---- */
.centre-card{
  background:var(--bg-card);
  border:1px solid var(--line);
  border-top:3px solid var(--text-dimmer);
  border-radius:6px;
  overflow:hidden;
  transition:border-top-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease, color 0.4s ease;
}

/* Full card background = palette colour — text needs dark overrides for legibility */
.centre-card.st-safe{
  background:#CAD73E;
  border-top-color:#8B9600;
  border-color:#8B9600;
}
.centre-card.st-caution{
  background:#FFC432;
  border-top-color:#B88000;
  border-color:#B88000;
}
.centre-card.st-danger{
  background:#F50016;
  border-top-color:#A30010;
  border-color:#A30010;
  animation:danger-pulse 2.5s ease-in-out infinite;
}
@keyframes danger-pulse{
  0%,100%{ box-shadow:0 0 0 0 rgba(245,0,22,0); }
  50%{ box-shadow:0 0 0 6px rgba(245,0,22,0.25); }
}
@media(prefers-reduced-motion:reduce){
  .centre-card.st-danger{ animation:none; }
}
.centre-card.st-loading{ opacity:0.45; }

/* Text: pure black for all readings inside coloured cards */
.st-safe .centre-name,
.st-caution .centre-name,
.st-danger .centre-name{ color:#000; }

.st-safe .card-status-badge,
.st-caution .card-status-badge,
.st-danger .card-status-badge{
  background:rgba(255,255,255,0.3);
  color:#000;
  border-color:rgba(255,255,255,0.5);
}

.st-safe .metric-label,
.st-caution .metric-label,
.st-danger .metric-label{ color:rgba(0,0,0,0.6); }

.st-safe .metric-value,
.st-caution .metric-value,
.st-danger .metric-value{ color:#000; }

.st-safe .metric-badge,
.st-caution .metric-badge,
.st-danger .metric-badge{ color:#000; }

/* Internal dividers: white */
.st-safe .card-divider,
.st-caution .card-divider,
.st-danger .card-divider{
  background:rgba(255,255,255,0.2);
  border-color:rgba(255,255,255,0.6);
}

.st-safe .card-divider-label,
.st-caution .card-divider-label,
.st-danger .card-divider-label{ color:rgba(0,0,0,0.65); }

.st-safe .metric,
.st-caution .metric,
.st-danger .metric{ border-color:rgba(255,255,255,0.6); }

.st-safe .card-timeline,
.st-caution .card-timeline,
.st-danger .card-timeline{ border-color:rgba(255,255,255,0.6); }

.st-safe .card-foot,
.st-caution .card-foot,
.st-danger .card-foot{ border-color:rgba(255,255,255,0.6); }

.st-safe .card-foot-label,
.st-caution .card-foot-label,
.st-danger .card-foot-label{ color:rgba(0,0,0,0.55); }

.st-safe .card-foot-station,
.st-caution .card-foot-station,
.st-danger .card-foot-station{ color:#000; }

.st-safe .card-head,
.st-caution .card-head,
.st-danger .card-head{ border-color:rgba(255,255,255,0.6); }

/* Keep timeline bar colours vivid and readable on coloured card backgrounds */
.st-safe .tl-bar    { background:rgba(0,0,0,0.2); opacity:1; }
.st-caution .tl-bar { background:rgba(0,0,0,0.2); opacity:1; }
.st-danger .tl-bar  { background:rgba(255,255,255,0.3); opacity:1; }

.st-safe .tl-bar.tl-now    { background:rgba(0,0,0,0.55); }
.st-caution .tl-bar.tl-now { background:rgba(0,0,0,0.55); }
.st-danger .tl-bar.tl-now  { background:rgba(255,255,255,0.85); }

/* Colour-coded bars outside coloured cards already handled by tl-safe/caution/danger classes */
/* Override: when a bar is inside a coloured card, use its own level colour against the card bg */
.st-safe .tl-bar.tl-safe       { background:rgba(0,0,0,0.5); }
.st-safe .tl-bar.tl-caution    { background:#FFC432; opacity:0.7; }
.st-safe .tl-bar.tl-danger     { background:#F50016; opacity:0.7; }
.st-safe .tl-bar.tl-now.tl-safe    { background:rgba(0,0,0,0.7); opacity:1; }
.st-safe .tl-bar.tl-now.tl-caution { background:#B88000; opacity:1; }
.st-safe .tl-bar.tl-now.tl-danger  { background:#A30010; opacity:1; }

.st-caution .tl-bar.tl-safe    { background:#636A00; opacity:0.6; }
.st-caution .tl-bar.tl-caution { background:rgba(0,0,0,0.45); }
.st-caution .tl-bar.tl-danger  { background:#F50016; opacity:0.8; }
.st-caution .tl-bar.tl-now.tl-safe    { background:#636A00; opacity:1; }
.st-caution .tl-bar.tl-now.tl-caution { background:rgba(0,0,0,0.65); opacity:1; }
.st-caution .tl-bar.tl-now.tl-danger  { background:#A30010; opacity:1; }

.st-danger .tl-bar.tl-safe     { background:#CAD73E; opacity:0.7; }
.st-danger .tl-bar.tl-caution  { background:#FFC432; opacity:0.7; }
.st-danger .tl-bar.tl-danger   { background:rgba(255,255,255,0.35); }
.st-danger .tl-bar.tl-now.tl-safe    { background:#CAD73E; opacity:1; }
.st-danger .tl-bar.tl-now.tl-caution { background:#FFC432; opacity:1; }
.st-danger .tl-bar.tl-now.tl-danger  { background:rgba(255,255,255,0.9); opacity:1; }

/* Card header */
.card-head{
  padding:11px 14px 9px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}
.centre-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:17px;
  letter-spacing:0.02em;
  color:var(--white);
  line-height:1.2;
}
.card-status-badge{
  flex-shrink:0;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:3px 8px;
  border-radius:3px;
  background:var(--bg-card-alt);
  color:var(--text-dim);
  border:1px solid var(--line);
  transition:background 0.4s, color 0.4s, border-color 0.4s;
  white-space:nowrap;
}
.st-safe .card-status-badge{ background:var(--safe-dim); color:var(--safe-text); border-color:var(--safe); }
.st-caution .card-status-badge{ background:var(--caution-dim); color:var(--caution-text); border-color:var(--caution); }
.st-danger .card-status-badge{ background:var(--danger-dim); color:var(--danger-text); border-color:var(--danger); }

/* Metrics row */
.card-metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-bottom:1px solid var(--line);
}
.metric{
  padding:10px 12px;
  text-align:center;
  position:relative;
}
.metric+.metric{ border-left:1px solid var(--line); }
/* Border separating the C2G/C2C lightning row from the WBGT/PSI row below.
   Grid order: 1=divider, 2=C2G, 3=C2C, 4=WBGT, 5=PSI */
.card-metrics > .metric:nth-child(4){
  border-top:1px solid var(--line);
}
.card-metrics > .metric:nth-child(5){
  border-top:1px solid var(--line);
  border-left:1px solid var(--line);
}
.card-divider{
  grid-column:1 / -1;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 12px;
  border-bottom:1px solid var(--line);
  background:var(--bg-card-alt);
  height:28px;
}
.card-divider-label{
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-dimmer);
  white-space:nowrap;
}
.info-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:15px;
  height:15px;
  border-radius:50%;
  border:1px solid var(--text-dimmer);
  font-size:9px;
  font-weight:700;
  color:var(--text-dimmer);
  cursor:pointer;
  position:relative;
  flex-shrink:0;
  font-style:normal;
  line-height:1;
  user-select:none;
  -webkit-user-select:none;
}
.info-icon .tooltip{
  display:none;
  position:fixed;
  bottom:auto;
  left:auto;
  transform:none;
  width:280px;
  background:#1A2233;
  color:#F2EFE6;
  font-size:11px;
  font-weight:400;
  letter-spacing:0.01em;
  text-transform:none;
  line-height:1.6;
  padding:10px 12px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  z-index:9999;
  pointer-events:none;
}
.info-icon .tooltip::after{
  content:'';
  position:absolute;
  top:100%;
  left:20px;
  border:5px solid transparent;
  border-top-color:#1A2233;
}
.info-icon:hover .tooltip,
.info-icon:focus .tooltip,
.info-icon.active .tooltip{
  display:block;
}
.metric-label{
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-dimmer);
  margin-bottom:4px;
  font-weight:600;
}
.metric-value{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:26px;
  line-height:1;
  color:var(--white);
  transition:color 0.4s;
}
.metric-value.safe  { color:var(--safe-text); }
.metric-value.caution{ color:var(--caution-text); }
.metric-value.danger { color:var(--danger-text); }
.metric-badge{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-top:3px;
  display:block;
  line-height:1.3;
}
.metric-badge.safe  { color:var(--safe-text); }
.metric-badge.caution{ color:var(--caution-text); }
.metric-badge.danger { color:var(--danger-text); }

/* WBGT Station row */
.card-station{
  padding:7px 12px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
}
.station-info{
  font-size:12px;
  color:var(--text-dim);
  line-height:1.3;
}
.station-name{
  color:var(--white);
  font-weight:600;
}
.station-dist{
  font-size:11px;
  color:var(--text-dimmer);
}

/* Mini timeline */
.card-timeline{
  padding:8px 12px;
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:44px;
}
.tl-bar{
  flex:1;
  border-radius:2px 2px 0 0;
  min-height:4px;
  background:var(--line);
  transition:height 0.6s ease;
}
.tl-bar.tl-safe    { background:var(--safe);    opacity:0.3; }
.tl-bar.tl-caution { background:var(--caution); opacity:0.3; }
.tl-bar.tl-danger  { background:var(--danger);  opacity:0.3; }
.tl-bar.tl-now.tl-safe    { background:var(--safe);    opacity:1; }
.tl-bar.tl-now.tl-caution { background:var(--caution); opacity:1; }
.tl-bar.tl-now.tl-danger  { background:var(--danger);  opacity:1; }
/* Card footer */
.card-foot{
  padding:6px 12px 8px;
  display:flex;
  flex-direction:column;
  gap:2px;
  font-size:11px;
  color:var(--text-dimmer);
  letter-spacing:0.03em;
}
.card-foot-label{
  color:var(--text-dimmer);
}
.card-foot-station{
  color:var(--text-dim);
  font-weight:700;
  font-size:12px;
}

/* Crowd row */
.card-crowd{
  display:grid;
  grid-template-columns:1fr 1fr;
  border-top:1px solid var(--line);
}
.crowd-cell{
  padding:8px 12px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.crowd-cell+.crowd-cell{ border-left:1px solid var(--line); }
.crowd-label{
  font-size:9px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-dimmer);
}
.crowd-bar-wrap{
  height:6px;
  background:var(--line);
  border-radius:3px;
  overflow:hidden;
}
.crowd-bar-fill{
  height:100%;
  border-radius:3px;
  background:var(--safe);
  transition:width 0.6s ease, background 0.4s ease;
}
.crowd-bar-fill.pct-mod { background:var(--caution); }
.crowd-bar-fill.pct-high{ background:var(--danger); }
.crowd-pct{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  font-size:13px;
  color:var(--text-dim);
  line-height:1;
}
.crowd-pct.pct-mod { color:var(--caution-text,var(--caution)); }
.crowd-pct.pct-high{ color:var(--danger-text,var(--danger)); }
.crowd-status{
  font-size:9px;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--text-dimmer);
}
/* Override text colours inside coloured cards */
.st-safe .crowd-label,.st-caution .crowd-label,.st-danger .crowd-label{ color:rgba(0,0,0,0.55); }
.st-safe .crowd-pct,.st-caution .crowd-pct,.st-danger .crowd-pct{ color:#000; }
.st-safe .crowd-status,.st-caution .crowd-status,.st-danger .crowd-status{ color:rgba(0,0,0,0.5); }
.st-safe .crowd-bar-wrap,.st-caution .crowd-bar-wrap,.st-danger .crowd-bar-wrap{ background:rgba(0,0,0,0.15); }
.st-safe .crowd-cell,.st-caution .crowd-cell,.st-danger .crowd-cell{ border-color:rgba(255,255,255,0.6); }
.st-safe .card-crowd,.st-caution .card-crowd,.st-danger .card-crowd{ border-color:rgba(255,255,255,0.6); }
</style>
</head>
<body>

<!-- ============ HEADER ============ -->
<div class="header">
  <div class="header-inner">
    <div class="brand-block">
      <div class="brand-bar"></div>
      <div class="brand-text">
        <div class="brand-main">HEAT/SG</div>
        <div class="brand-sub">ActiveSG Sport Centres<br>Heat Stress Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock-block">
        <div class="clock-date" id="clock-date">—</div>
        <div class="clock-time" id="clock-time">—</div>
      </div>
    </div>
  </div>
</div>

<!-- ============ DATA BAR ============ -->
<div class="data-bar">
  <div class="data-bar-inner">
    <div class="data-pill">Last refresh <span id="pill-refresh">—</span></div>
    <div class="data-pill">Island-wide C2G Lightning (30 min) <span id="pill-lightning">—</span></div>
    <div class="data-pill">WBGT Stations <span id="pill-wbgt">—</span></div>
    <div class="data-pill">PSI <span id="pill-psi">—</span></div>
    <div class="status-pill" id="status-msg">Loading…</div>
  </div>
</div>

<!-- ============ DASHBOARD BODY ============ -->
<div class="body">

  <div class="zone">
    <div class="zone-header">
      <div class="zone-label-block">
        <div class="zone-icon">Zone</div>
        <div class="zone-name">North</div>
      </div>
      <span class="zone-count" id="count-north"></span>
      <div class="zone-line"></div>
    </div>
    <div class="zone-grid" id="grid-north"></div>
  </div>

  <div class="zone">
    <div class="zone-header">
      <div class="zone-label-block">
        <div class="zone-icon">Zone</div>
        <div class="zone-name">Northeast</div>
      </div>

function tickClock(){

// ---------- UTILS ----------
function haversine(la1,lo1,la2,lo2){
  var R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distLabel(km){
  return km<1?Math.round(km*1000)+" m":km.toFixed(1)+" km";
}
function timeAgo(iso){
  if(!iso) return "—";
  var m=Math.round((Date.now()-new Date(iso))/60000);
  return m<=0?"just now":m===1?"1 min ago":m<60?m+" min ago":Math.round(m/60)+"h ago";
}
function classifyWBGT(v,flag){
  if(flag){ var f=flag.toLowerCase(); if(f.indexOf("high")>-1)return"danger"; if(f.indexOf("mod")>-1)return"caution"; if(f.indexOf("low")>-1)return"safe"; }
  if(isNaN(v)) return null;
  return v>=33?"danger":v>=31?"caution":"safe";
}
function classifyPSI(v){
  if(isNaN(v)) return null;
  return v>200?"danger":v>100?"caution":"safe";
}
function worstOf(levels){
  if(levels.indexOf("danger")>-1) return"danger";
  if(levels.indexOf("caution")>-1) return"caution";
  if(levels.indexOf("safe")>-1) return"safe";
  return null;
}

function fetchProxy(api,date){

// ---------- PARSE WBGT STATIONS (latest snapshot) ----------
function parseWBGTLatest(json){
  var recs=(json&&json.data&&json.data.records)||[];
  if(!recs.length) return [];
  var latest=recs[recs.length-1];
  return ((latest.item&&latest.item.readings)||[]).map(function(r){
    var loc=r.location||{};
    return {
      id:r.station&&r.station.id,
      name:r.station&&r.station.name,
      lat:Number(loc.latitude), lon:Number(loc.longitude),
      value:Number(r.wbgt), flag:r.heatStress,
      timestamp:latest.updatedTimestamp||latest.datetime
    };
  }).filter(function(s){return !isNaN(s.lat)&&!isNaN(s.lon)&&!isNaN(s.value);});
}

// ---------- PARSE WBGT HISTORY (full day for timeline) ----------
function parseWBGTHistory(json, stationId){
  var recs=(json&&json.data&&json.data.records)||[];
  var points=[];
  recs.forEach(function(rec){
    var readings=(rec.item&&rec.item.readings)||[];
    var match=readings.filter(function(r){return r.station&&r.station.id===stationId;})[0];
    if(!match) return;
    var v=Number(match.wbgt); if(isNaN(v)) return;
    var t=rec.datetime?new Date(rec.datetime):null; if(!t||isNaN(t)) return;
    points.push({time:t, value:v, flag:match.heatStress});
  });
  points.sort(function(a,b){return a.time-b.time;});
  return points;
}

function nearest(stations, lat, lon){
  var best=null, bd=Infinity;
  stations.forEach(function(s){ var d=haversine(lat,lon,s.lat,s.lon); if(d<bd){bd=d;best=s;} });
  return best ? {station:best, distKm:bd} : null;
}

// ---------- PARSE LIGHTNING ----------
function parseLightning(json){
  var recs=(json&&json.data&&json.data.records)||[];
  var strikes=[];
  recs.forEach(function(rec){
    ((rec.item&&rec.item.readings)||[]).forEach(function(r){
      var loc=r.location||{},lat=Number(loc.latitude),lon=Number(loc.longitude);
      if(isNaN(lat)||isNaN(lon)) return;
      var t=r.datetime?new Date(r.datetime):null;
      strikes.push({lat:lat,lon:lon,type:r.type,time:t});
    });
  });
  return strikes;
}
function nearbyLightning(strikes,lat,lon){
  var cutoff=new Date(Date.now()-30*60*1000);
  var nearby=strikes.filter(function(s){return s.time&&s.time>=cutoff&&haversine(lat,lon,s.lat,s.lon)<=LIGHTNING_RADIUS_KM;});
  return {
    g: nearby.filter(function(s){return s.type==="G";}),  // Cloud-to-Ground (dangerous)
    c: nearby.filter(function(s){return s.type==="C";}),  // Cloud-to-Cloud
    all: nearby
  };
}

// ---------- PARSE PSI ----------
function parsePSI(json){
  var data=(json&&json.data)||{};
  var regionMeta=data.regionMetadata||[];
  var items=data.items||[];
  if(!items.length) return {regions:[],psi24h:{}};
  var latest=items[items.length-1];
  var psi24h=((latest.readings||{}).psi_twenty_four_hourly)||{};
  var regions=regionMeta.map(function(r){
    var loc=r.labelLocation||{};
    return {name:r.name,lat:Number(loc.latitude),lon:Number(loc.longitude)};
  }).filter(function(r){return !isNaN(r.lat)&&!isNaN(r.lon);});
  return {regions:regions,psi24h:psi24h};
}
function nearestPSI(parsed,lat,lon){
  var best=null,bd=Infinity;
  parsed.regions.forEach(function(r){var d=haversine(lat,lon,r.lat,r.lon);if(d<bd){bd=d;best=r;}});
  if(!best) return NaN;
  var key=Object.keys(parsed.psi24h).filter(function(k){return k.toLowerCase()===best.name.toLowerCase();})[0];
  return key?Number(parsed.psi24h[key]):NaN;
}

// ---------- RENDER TIMELINE ----------
function renderTimeline(centreId, historyPoints, currentLevel){
  var tl=document.getElementById("tl-"+centreId);
  if(!tl) return;
  var now=new Date(), ago3=new Date(now-3*60*60*1000);
  var recent=historyPoints.filter(function(p){return p.time>=ago3;});
  if(!recent.length) recent=historyPoints.slice(-12);
  tl.innerHTML='';
  if(!recent.length){ var empty=document.createElement("div"); empty.className="tl-bar"; tl.appendChild(empty); return; }
  var vals=recent.map(function(p){return p.value;});
  var minV=Math.min.apply(null,vals), maxV=Math.max.apply(null,vals);
  var range=Math.max(0.5,maxV-minV);
  recent.forEach(function(p,i){
    var lvl=classifyWBGT(p.value,p.flag)||currentLevel||"safe";
    var isLast=i===recent.length-1;
    var bar=document.createElement("div");
    bar.className="tl-bar tl-"+lvl+(isLast?" tl-now":"");
    bar.style.height=Math.max(8,25+((p.value-minV)/range)*65)+"%";
    bar.title=p.time.toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit"})+" · "+p.value.toFixed(1)+"°C";
    tl.appendChild(bar);
  });
}

// ---------- RENDER CARD ----------
function renderCard(centre, wbgt, lightning, psiVal, history){
  var card=document.getElementById("card-"+centre.id);
  if(!card) return;

  var wLevel=classifyWBGT(wbgt.value,wbgt.flag);
  // C2G (cloud-to-ground) = danger; C2C alone = caution; neither = safe
  var lLevel=lightning.g.length>0?"danger":lightning.c.length>0?"caution":"safe";
  var pLevel=classifyPSI(psiVal);
  var overall=worstOf([wLevel,lLevel,pLevel].filter(Boolean));

  card.className="centre-card"+(overall?" st-"+overall:" st-loading");

  var statusLabels={"safe":"Low","caution":"Moderate","danger":"High / Alert"};
  var csb=document.getElementById("csb-"+centre.id);
  if(csb) csb.textContent=overall?statusLabels[overall]:"No data";

  // WBGT
  var wv=document.getElementById("wv-"+centre.id), wb=document.getElementById("wb-"+centre.id);
  if(wv){ wv.textContent=!isNaN(wbgt.value)?wbgt.value.toFixed(1)+"°":"—"; wv.className="metric-value"+(wLevel?" "+wLevel:""); }
  var wLabels={"safe":"Low","caution":"Moderate","danger":"High"};
  if(wb){ wb.textContent=wLevel?wLabels[wLevel]:"N/A"; wb.className="metric-badge"+(wLevel?" "+wLevel:""); }

  // PSI
  var pv=document.getElementById("pv-"+centre.id), pb=document.getElementById("pb-"+centre.id);
  var pLabels={"safe":"Good/Mod","caution":"Unhealthy","danger":"V. Unhealthy"};
  if(pv){ pv.textContent=!isNaN(psiVal)?psiVal:"—"; pv.className="metric-value"+(pLevel?" "+pLevel:""); }
  if(pb){ pb.textContent=pLevel?pLabels[pLevel]:"N/A"; pb.className="metric-badge"+(pLevel?" "+pLevel:""); }

  // Cloud-to-Ground lightning (the dangerous kind)
  var lgv=document.getElementById("lgv-"+centre.id), lgb=document.getElementById("lgb-"+centre.id);
  var gAlert=lightning.g.length>0;
  if(lgv){ lgv.textContent=gAlert?lightning.g.length:"✓"; lgv.className="metric-value"+(gAlert?" danger":" safe"); lgv.style.fontSize="22px"; lgv.style.lineHeight="1.3"; }
  if(lgb){ lgb.textContent=gAlert?lightning.g.length+" within 6km":"Clear"; lgb.className="metric-badge"+(gAlert?" danger":" safe"); }

  // Cloud-to-Cloud lightning
  var lcv=document.getElementById("lcv-"+centre.id), lcb=document.getElementById("lcb-"+centre.id);
  var cAlert=lightning.c.length>0;
  if(lcv){ lcv.textContent=cAlert?lightning.c.length:"✓"; lcv.className="metric-value"+(cAlert?" caution":" safe"); lcv.style.fontSize="22px"; lcv.style.lineHeight="1.3"; }
  if(lcb){ lcb.textContent=cAlert?lightning.c.length+" within 6km":"Clear"; lcb.className="metric-badge"+(cAlert?" caution":" safe"); }

  // Station
  var sn=document.getElementById("sn-"+centre.id);
  var sd=document.getElementById("sd-"+centre.id);
  var su=document.getElementById("su-"+centre.id);
  if(sn) sn.textContent=wbgt.station?wbgt.station.name:"—";
  if(sd) sd.textContent=wbgt.distKm!=null?"· "+distLabel(wbgt.distKm):"";
  if(su) su.textContent=wbgt.timestamp?timeAgo(wbgt.timestamp):"—";

  // Timeline
  renderTimeline(centre.id, history||[], overall);

  // Footer
  var cf=document.getElementById("cf-"+centre.id);
  if(cf) cf.textContent=wbgt.station?wbgt.station.name+" · "+distLabel(wbgt.distKm):"No station data";
}

var dataState = { wbgtStations:[], wbgtHistory:{}, strikes:[], psiParsed:{regions:[],psi24h:{}}, crowd:{} };

// ---------- CROWD ----------
// crowd-data.json is written by GitHub Actions every 15 min (0700–2200 SGT)
// and committed to the repo — no CORS issues since it's on raw.githubusercontent.com
var CROWD_JSON_URL = "https://raw.githubusercontent.com/sportsafetysandbox/heatstress/main/crowd-data.json";
var CROWD_REFRESH_MS = 5 * 60 * 1000; // check every 5 min (file updates every 15 min)

function fetchCrowd(){
  return fetch(CROWD_JSON_URL + "?t=" + Date.now()) // cache-bust
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(json){
      if(json.error){
        console.warn("Crowd data unavailable:", json.status||json.message);
        return;
      }
      var lookup = {};
      (json.gymFacilities||[]).forEach(function(f){ lookup[f.id]=f; });
      (json.swimFacilities||[]).forEach(function(f){ lookup[f.id]=f; });
      dataState.crowd = lookup;
      dataState.crowdUpdatedAt = json.updatedAt||null;
      updateCrowdCards();
    }).catch(function(e){ console.warn("Crowd fetch failed:", e.message); });
}

function crowdClass(pct){
  return pct >= 75 ? "pct-high" : pct >= 50 ? "pct-mod" : "";
}

function renderCrowdCell(centreId, prefix, facilityId){
  var pctEl  = document.getElementById(prefix+"pct-"+centreId);
  var stsEl  = document.getElementById(prefix+"sts-"+centreId);
  var barEl  = document.getElementById(prefix+"bf-"+centreId);
  if(!pctEl||!stsEl||!barEl) return;
  if(!facilityId){
    pctEl.textContent="N/A"; stsEl.textContent="No gantry data";
    barEl.style.width="0%"; barEl.className="crowd-bar-fill";
    return;
  }
  var f = dataState.crowd[facilityId];
  if(!f){
    pctEl.textContent="—"; stsEl.textContent="No data";
    barEl.style.width="0%"; return;
  }
  if(f.isClosed){
    pctEl.textContent="Closed"; pctEl.className="crowd-pct";
    stsEl.textContent="Facility closed";
    barEl.style.width="0%"; barEl.className="crowd-bar-fill"; return;
  }
  var pct = f.capacityPercentage||0;
  var cls = crowdClass(pct);
  pctEl.textContent = pct+"%";
  pctEl.className = "crowd-pct"+(cls?" "+cls:"");
  stsEl.textContent = pct>=75?"Busy":pct>=50?"Moderate":"Quiet";
  barEl.style.width = pct+"%";
  barEl.className = "crowd-bar-fill"+(cls?" "+cls:"");
}

function updateCrowdCards(){
  var allCentres=Object.values(ZONES).reduce(function(a,b){return a.concat(b);});
  allCentres.forEach(function(c){
    renderCrowdCell(c.id, "g", c.gymId);
    renderCrowdCell(c.id, "p", c.poolId);
  });
}


function updateAllCards(){
  var allCentres=Object.values(ZONES).reduce(function(a,b){return a.concat(b);});
  allCentres.forEach(function(c){
    var wRes=null, bd=Infinity;
    dataState.wbgtStations.forEach(function(s){var d=haversine(c.lat,c.lon,s.lat,s.lon);if(d<bd){bd=d;wRes={station:s,distKm:d};}});
    var wbgtResult = wRes ? {value:wRes.station.value, flag:wRes.station.flag, station:wRes.station, distKm:wRes.distKm, timestamp:wRes.station.timestamp} : {value:NaN};
    var lNearby=nearbyLightning(dataState.strikes,c.lat,c.lon);
    var psiVal=nearestPSI(dataState.psiParsed,c.lat,c.lon);
    var hist=wRes?(dataState.wbgtHistory[wRes.station.id]||[]):[];
    renderCard(c, wbgtResult, lNearby, psiVal, hist);
  });
}

// ---------- MAIN REFRESH ----------
function refresh(){
  document.getElementById("status-msg").textContent="Refreshing…";
  document.getElementById("pill-refresh").textContent="…";

  var today=todayStr();
  Promise.all([
    fetchProxy("wbgt"),
    fetchProxy("wbgt", today),
    fetchProxy("lightning"),
    fetchProxy("psi")
  ]).then(function(res){
    dataState.wbgtStations = parseWBGTLatest(res[0]);
    dataState.strikes      = parseLightning(res[2]);
    dataState.psiParsed    = parsePSI(res[3]);

    // Build history lookup keyed by station ID
    var recs=(res[1]&&res[1].data&&res[1].data.records)||[];
    dataState.wbgtHistory={};
    dataState.wbgtStations.forEach(function(s){
      dataState.wbgtHistory[s.id]=parseWBGTHistory(res[1],s.id);
    });

    updateAllCards();

    // Pill updates
    document.getElementById("pill-wbgt").textContent=dataState.wbgtStations.length+" live";
    document.getElementById("pill-lightning").textContent=(function(){
      var cutoff=new Date(Date.now()-30*60*1000);
      var g=dataState.strikes.filter(function(s){return s.time&&s.time>=cutoff&&s.type==="G";}).length;
      return g+" strikes";
    })();
    document.getElementById("pill-psi").textContent=dataState.psiParsed.regions.length+" regions";
    document.getElementById("pill-refresh").textContent=new Date().toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("status-msg").textContent="Live · WBGT every 15 min · Lightning every 2 min · PSI every hour · Dashboard every 5 min";

  }).catch(function(err){
    document.getElementById("status-msg").textContent="Data error: "+err.message;
    document.getElementById("pill-refresh").textContent="failed";
  });
}

// Faster lightning-only refresh
function refreshLightning(){
  fetchProxy("lightning").then(function(res){
    dataState.strikes=parseLightning(res);
    updateAllCards();
    (function(){
      var cutoff=new Date(Date.now()-30*60*1000);
      var g=dataState.strikes.filter(function(s){return s.time&&s.time>=cutoff&&s.type==="G";}).length;
      document.getElementById("pill-lightning").textContent=g+" strikes";
    })();
  }).catch(function(){});
}

buildCards();
refresh();
fetchCrowd();
setInterval(refresh, REFRESH_MS);
setInterval(refreshLightning, LIGHTNING_REFRESH_MS);
setInterval(fetchCrowd, CROWD_REFRESH_MS);

// Mobile tap + desktop click support for info icon tooltips.
// Tooltip uses position:fixed to escape card overflow:hidden clipping.
// JS positions it relative to the icon's screen coordinates.
function positionTooltip(icon){
  var tooltip = icon.querySelector(".tooltip");
  if(!tooltip) return;
  var rect = icon.getBoundingClientRect();
  var tooltipW = 280;
  var gap = 8;
  // Position above the icon
  var top = rect.top - gap;
  var left = rect.left + (rect.width / 2) - (tooltipW / 2);
  // Keep within viewport horizontally
  var vw = window.innerWidth;
  if(left < 8) left = 8;
  if(left + tooltipW > vw - 8) left = vw - tooltipW - 8;
  // If not enough room above, position below instead
  if(top - 120 < 0){
    tooltip.style.top = (rect.bottom + gap) + "px";
    tooltip.style.bottom = "auto";
    // flip the arrow
    tooltip.style.setProperty("--arrow-top", "-10px");
  } else {
    tooltip.style.top = "auto";
    tooltip.style.bottom = (window.innerHeight - rect.top + gap) + "px";
  }
  tooltip.style.left = left + "px";
  tooltip.style.width = tooltipW + "px";
}

document.addEventListener("click", function(e){
  var icon = e.target.closest(".info-icon");
  if(icon){
    e.stopPropagation();
    var isActive = icon.classList.contains("active");
    document.querySelectorAll(".info-icon.active").forEach(function(el){ el.classList.remove("active"); });
    if(!isActive){
      icon.classList.add("active");
      positionTooltip(icon);
    }
    return;
  }
  document.querySelectorAll(".info-icon.active").forEach(function(el){ el.classList.remove("active"); });
});

// Desktop: reposition on hover in case of scroll
document.addEventListener("mouseover", function(e){
  var icon = e.target.closest(".info-icon");
  if(icon) positionTooltip(icon);
});

})();
