# .github/workflows/crowd-data.yml
#
# Fetches ActiveSG gym and pool crowd data every 15 minutes
# during operating hours (0700–2200 SGT = 2300–1400 UTC).
# Saves result as crowd-data.json in the repo root.

name: Fetch ActiveSG Crowd Data

on:
  schedule:
    # Every 15 minutes from 2300 UTC to 1400 UTC (0700–2200 SGT)
    # GitHub Actions cron does not support time ranges natively,
    # so we run every 15 min all day and let the script skip outside hours.
    - cron: '0,15,30,45 23 * * *'   # 2300 UTC
    - cron: '0,15,30,45 0-13 * * *' # 0000–1359 UTC  (0800–2159 SGT)
    - cron: '0,15,30,45 14 * * *'   # 1400 UTC (2200 SGT) — last run
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-crowd:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit crowd-data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch crowd data
        run: node scripts/fetch-crowd.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crowd-data.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to crowd-data.json — skipping commit"
          else
            git commit -m "chore: update crowd data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
